{% extends 'base.html' %}

{% block title %}Buat Tiket - IT Hub Internal{% endblock %}

{% block content %}
<h2 class="mb-4">Buat Tiket Baru</h2>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Judul Tiket</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Deskripsi Masalah</label>
                <textarea name="description" class="form-control" rows="5" required></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Prioritas</label>
                    <select name="priority" class="form-select" required>
                        <option value="low">Rendah</option>
                        <option value="medium" selected>Sedang</option>
                        <option value="high">Tinggi</option>
                        <option value="urgent">Darurat</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Lampiran (Opsional)</label>
                    <input type="file" name="attachment" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Kirim Tiket</button>
            <a href="{% url 'tickets:ticket_list' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
