<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Logout - IT Hub Internal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ink: #0d1724;
            --panel: #ffffff;
            --muted: #64748b;
            --line: #dbe5ef;
            --cyan: #38bdf8;
            --green: #22c55e;
            --danger: #e5484d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at 24% 18%, rgba(56, 189, 248, 0.22), transparent 30%),
                radial-gradient(circle at 78% 72%, rgba(34, 197, 94, 0.14), transparent 26%),
                linear-gradient(135deg, #152231 0%, #0d1724 100%);
            color: var(--ink);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logout-container {
            max-width: 520px;
            width: 100%;
        }

        .logout-card {
            background: var(--panel);
            border: 1px solid rgba(219, 229, 239, 0.75);
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logout-header {
            padding: 34px 34px 30px;
            background:
                linear-gradient(135deg, rgba(56, 189, 248, 0.14) 0%, rgba(34, 197, 94, 0.08) 100%),
                #f8fbfd;
            border-bottom: 1px solid var(--line);
            text-align: center;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 62px;
            height: 62px;
            margin-bottom: 18px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--green) 100%);
            color: #ffffff;
            box-shadow: 0 16px 34px rgba(2, 132, 199, 0.24);
            font-size: 1.85rem;
        }

        .logout-kicker {
            display: block;
            margin-bottom: 7px;
            color: #0369a1;
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .logout-header h3 {
            margin: 0;
            color: #0f172a;
            font-weight: 850;
            font-size: 1.8rem;
            letter-spacing: 0;
        }

        .logout-header p {
            margin: 8px 0 0 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .logout-body {
            padding: 30px 34px 34px;
            text-align: center;
        }

        .logout-body p {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 0 0 26px;
            padding: 14px 16px;
            border: 1px solid #dbeafe;
            border-radius: 8px;
            background: #eff6ff;
            color: #334155;
            font-size: 0.94rem;
            line-height: 1.55;
            text-align: left;
        }

        .logout-body p i {
            margin-top: 3px;
            color: #0284c7;
        }

        .logout-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logout-actions form {
            display: inline-flex;
        }

        .btn-logout,
        .btn-cancel {
            min-width: 142px;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: 750;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .btn-logout {
            background: var(--danger);
            border: none;
            color: white;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(229, 72, 77, 0.28);
            background: #d43f44;
            color: white;
        }

        .btn-cancel {
            display: inline-block;
            background: #ffffff;
            border: 1px solid #bfdbfe;
            color: #0369a1;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background: #eff6ff;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(2, 132, 199, 0.16);
            color: #075985;
        }

        .logout-footer {
            text-align: center;
            padding: 17px 20px;
            background: #f8fafc;
            border-top: 1px solid #edf2f7;
            color: var(--muted);
            font-size: 0.82rem;
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }

            .logout-header,
            .logout-body {
                padding-left: 22px;
                padding-right: 22px;
            }

            .logout-actions,
            .logout-actions form,
            .btn-logout,
            .btn-cancel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-card">
            <div class="logout-header">
                <span class="brand-mark"><i class="bi bi-shield-lock"></i></span>
                <span class="logout-kicker">IT Hub Internal</span>
                <h3>Konfirmasi Logout</h3>
                <p>Apakah Anda yakin ingin keluar?</p>
            </div>
            <div class="logout-body">
                <p>
                    <i class="bi bi-info-circle"></i>
                    <span>Anda akan keluar dari sistem dan harus login kembali untuk mengakses dashboard.</span>
                </p>
                <div class="logout-actions">
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn-logout">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Ya, Logout
                        </button>
                    </form>
                    <a href="{% url 'dashboard' %}" class="btn-cancel">
                        <i class="bi bi-x-circle me-2"></i>
                        Batal
                    </a>
                </div>
            </div>
            <div class="logout-footer">
                <i class="bi bi-shield-check"></i> IT Hub Internal &copy; 2026
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
