{% extends 'base.html' %}

{% block title %}{% if object %}Edit{% else %}Tambah{% endif %} Kategori - IT Hub Internal{% endblock %}

{% block content %}
<h2 class="mb-4">{% if object %}Edit{% else %}Tambah{% endif %} Kategori</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nama Kategori</label>
                <input type="text" name="name" class="form-control" value="{{ form.name.value|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Deskripsi (Opsional)</label>
                <textarea name="description" class="form-control" rows="3">{{ form.description.value|default:'' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Simpan</button>
            <a href="{% url 'inventory:category_list' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
